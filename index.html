<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="format-detection" content="telephone=no">
    <title>EchoBridge</title>
    <link rel="icon" href="icon.png" type="image/png">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#08080c">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
<base target="_blank">
</head>
<body>
    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="brand">
                <div class="brand-icon">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="2,13 5,13 7,7 10,19 13,4 16,20 19,13 22,13"/>
                    </svg>
                </div>
                <h1 class="brand-title">EchoBridge</h1>
            </div>
            <div class="header-actions">
                <button class="icon-btn btn-modern btn-history" aria-label="Geçmiş" title="Geçmiş">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 8v5l3 2"/>
                        <path d="M3.5 9a9 9 0 1 1 .8 6.2"/>
                        <polyline points="1 9 3.5 9 3.5 6.5"/>
                    </svg>
                </button>
                <button class="icon-btn btn-modern btn-settings" aria-label="Ayarlar" title="Ayarlar">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="4" y1="6" x2="20" y2="6"/><circle cx="9" cy="6" r="2" fill="currentColor" stroke="none"/>
                        <line x1="4" y1="12" x2="20" y2="12"/><circle cx="15" cy="12" r="2" fill="currentColor" stroke="none"/>
                        <line x1="4" y1="18" x2="20" y2="18"/><circle cx="7" cy="18" r="2" fill="currentColor" stroke="none"/>
                    </svg>
                </button>
            </div>
        </header>

        <!-- PWA Install Banner -->
        <div id="pwa-install-banner" class="pwa-banner hidden">
            <span>EchoBridge'i ana ekrana ekleyin</span>
            <button id="btn-install-pwa" class="pwa-install-btn">Ekle</button>
            <button id="btn-dismiss-pwa" class="pwa-dismiss-btn" aria-label="Kapat">×</button>
        </div>

        <!-- Ana İçerik -->
        <main class="content">
            <!-- Kaynak Kart -->
            <div class="card card-source" id="card-source">
                <div class="card-top">
                    <button class="lang-badge btn-modern" id="badge-source" aria-label="Kaynak Dili Değiştir">
                        <span class="flag" id="flag-source">🇹🇷</span>
                        <span class="lang-name" id="name-source">Türkçe</span>
                        <svg class="icon chevron-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
                    </button>
                    <div class="card-actions">
                        <button class="act-btn btn-modern btn-speak-source" aria-label="Kaynak Metni Seslendir" title="Seslendir">
                            <svg class="icon speak-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M4 9v6h4l5 4V5L8 9H4z" fill="currentColor" stroke="none"/>
                                <path d="M16 8a5 5 0 0 1 0 8"/>
                                <path d="M18.5 5.5a9 9 0 0 1 0 13"/>
                            </svg>
                        </button>
                        <button class="act-btn btn-modern btn-clear" aria-label="Metni Temizle" title="Temizle">
                            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="card-body">
                    <textarea id="text-source" dir="auto" placeholder="Metin yazın veya mikrofona basın..." maxlength="5000"></textarea>
                    <span class="char-counter" id="char-count">0/5000</span>
                    <div class="loader hidden" id="loader-source"><div class="spinner"></div></div>
                </div>
            </div>

            <!-- Swap -->
            <div class="swap-area">
                <button class="swap-btn btn-modern" aria-label="Dilleri Değiştir" title="Dilleri Değiştir">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="16 3 20 7 16 11"/><line x1="20" y1="7" x2="8" y2="7"/>
                        <polyline points="8 21 4 17 8 13"/><line x1="4" y1="17" x2="16" y2="17"/>
                    </svg>
                </button>
            </div>

            <!-- Hedef Kart -->
            <div class="card card-target" id="card-target">
                <div class="card-top">
                    <button class="lang-badge btn-modern" id="badge-target" aria-label="Hedef Dili Değiştir">
                        <span class="flag" id="flag-target">🇺🇸</span>
                        <span class="lang-name" id="name-target">İngilizce</span>
                        <svg class="icon chevron-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
                    </button>
                    <div class="card-actions">
                        <button class="act-btn btn-modern btn-share" aria-label="Çeviriyi Paylaş" title="Paylaş">
                            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="18" cy="5" r="2.5"/><circle cx="6" cy="12" r="2.5"/><circle cx="18" cy="19" r="2.5"/>
                                <line x1="8.3" y1="10.7" x2="15.7" y2="6.3"/><line x1="8.3" y1="13.3" x2="15.7" y2="17.7"/>
                            </svg>
                        </button>
                        <button class="act-btn btn-modern btn-speak-target" aria-label="Çeviriyi Seslendir" title="Seslendir">
                            <svg class="icon speak-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M4 9v6h4l5 4V5L8 9H4z" fill="currentColor" stroke="none"/>
                                <path d="M16 8a5 5 0 0 1 0 8"/>
                                <path d="M18.5 5.5a9 9 0 0 1 0 13"/>
                            </svg>
                        </button>
                        <button class="act-btn btn-modern btn-copy" aria-label="Çeviriyi Kopyala" title="Kopyala">
                            <svg class="icon copy-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="9" y="9" width="11" height="11" rx="2"/>
                                <path d="M5 15V5a2 2 0 0 1 2-2h10"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="card-body" aria-live="polite">
                    <textarea id="text-target" dir="auto" placeholder="Çeviri burada görünecek..." readonly></textarea>
                    <div class="loader hidden" id="loader-target"><div class="spinner"></div></div>
                </div>
            </div>
        </main>

        <!-- Mikrofon Footer -->
        <footer class="footer">
            <button class="mic-btn mic-cyan btn-modern" id="btn-source" aria-label="Kaynak Dilde Konuş">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="9" y="2" width="6" height="12" rx="3"/>
                    <path d="M5 10a7 7 0 0 0 14 0"/>
                    <line x1="12" y1="19" x2="12" y2="22"/>
                    <line x1="8" y1="22" x2="16" y2="22"/>
                </svg>
                <span id="label-source">TR</span>
            </button>
            <button class="mic-btn mic-rose btn-modern" id="btn-target" aria-label="Hedef Dilde Konuş">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="9" y="2" width="6" height="12" rx="3"/>
                    <path d="M5 10a7 7 0 0 0 14 0"/>
                    <line x1="12" y1="19" x2="12" y2="22"/>
                    <line x1="8" y1="22" x2="16" y2="22"/>
                </svg>
                <span id="label-target">EN</span>
            </button>
        </footer>

        <!-- MCT Yazılım İmzası -->
        <div class="mct-signature">MCT Yazılım</div>

        <!-- Geçmiş Modalı -->
        <div id="history-modal" class="modal hidden">
            <div class="modal-backdrop"></div>
            <div class="modal-panel">
                <div class="panel-header">
                    <h3>Çeviri Geçmişi</h3>
                    <div class="panel-header-actions">
                        <button class="clear-history-btn btn-modern" id="btn-clear-history" aria-label="Tüm Geçmişi Temizle">
                            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="3 6 5 6 21 6"/>
                                <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                                <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                                <line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/>
                            </svg>
                            Temizle
                        </button>
                        <button class="done-btn btn-modern">Bitti</button>
                    </div>
                </div>
                <div class="panel-body" id="history-list">
                    <div class="empty-state">Henüz çeviri yapılmadı.</div>
                </div>
            </div>
        </div>

        <!-- Ayarlar Modalı -->
        <div id="settings-modal" class="modal hidden">
            <div class="modal-backdrop"></div>
            <div class="modal-panel">
                <div class="panel-header">
                    <h3 id="modal-title">Hedef Dil Seç</h3>
                    <button class="done-btn btn-modern">Bitti</button>
                </div>

                <div class="settings-group" id="speed-section">
                    <h4>Ses Hızı</h4>
                    <div class="speed-row">
                        <button class="speed-opt btn-modern" data-speed="0.7">Yavaş</button>
                        <button class="speed-opt btn-modern active" data-speed="1.0">Normal</button>
                        <button class="speed-opt btn-modern" data-speed="1.3">Hızlı</button>
                    </div>
                </div>

                <div class="settings-group lang-group">
                    <div class="lang-search-row">
                        <h4>Dil Seçimi</h4>
                        <div class="search-input-wrap">
                            <svg class="icon search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="10" cy="10" r="6"/><line x1="15" y1="15" x2="21" y2="21"/>
                            </svg>
                            <input type="text" id="lang-search" placeholder="Dil ara...">
                        </div>
                    </div>
                    <div class="panel-body" id="lang-list"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('SW Başarılı'))
                    .catch(err => console.log('SW Hata:', err));
            });
        }
    </script>
</body>
</html>
